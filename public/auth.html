<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique TCG - Giriş & Kayıt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('tcg_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body style="background-color: var(--light-bg); color: var(--text-main);">
    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">
            <!-- Left Side: Branding/Visual -->
            <div class="col-lg-6 d-none d-lg-flex auth-split-bg align-items-center justify-content-center p-5 text-white position-relative overflow-hidden">
                <div class="position-relative" style="z-index: 2">
                    <a href="index.html" class="d-flex align-items-center gap-2 mb-5 text-white text-decoration-none">
                        <div class="logo-circle rounded-circle" style="background-color: #FFFFFF; box-shadow: 0 0 20px rgba(255,255,255,0.4)"></div>
                        <h2 class="fw-bold tracking-tighter mb-0">BOUTIQUE<span class="opacity-75">TCG</span></h2>
                    </a>
                    <h1 class="display-3 fw-bold tracking-tighter mb-4 animate-fade-in-up" style="animation-delay: 0.1s">KOLEKSİYONUNU<br>BİR ÜST SEVİYEYE<br>TAŞI.</h1>
                    <p class="lead fw-medium opacity-75 animate-fade-in-up" style="animation-delay: 0.2s; max-width: 450px">Dünyanın en nadir Pokémon kartlarına erişmek için topluluğumuza katıl.</p>
                </div>
                <!-- Some decorative elements -->
                <div class="position-absolute bottom-0 start-0 p-5 opacity-10" style="font-size: 12rem; font-weight: 900; line-height: 0.8; letter-spacing: -0.1em;">POKEMON</div>
            </div>

            <!-- Right Side: Forms -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center p-4 p-md-5" style="background-color: var(--light-bg);">
                <div class="w-100" style="max-width: 450px">
                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill px-3 py-1 fw-bold x-small d-lg-none">
                            <i class="bi bi-arrow-left me-1"></i> ANA SAYFA
                        </a>
                        <div id="theme-toggle" class="ms-auto"><i class="bi bi-moon-fill h5 mb-0"></i></div>
                    </div>

                    <div class="auth-card p-4 p-md-5 animate-fade-in-up" style="animation-delay: 0.3s; background-color: var(--card-bg);">
                        <ul class="nav nav-pills nav-justified mb-5" id="authTab" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active fw-bold text-uppercase x-small tracking-widest py-3 border-0 rounded-pill" data-bs-toggle="pill" data-bs-target="#login">GİRİŞ YAP</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link fw-bold text-uppercase x-small tracking-widest py-3 border-0 rounded-pill" data-bs-toggle="pill" data-bs-target="#register">KAYIT OL</button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <!-- Login Form -->
                            <div class="tab-pane fade show active" id="login">
                                <form id="loginForm">
                                    <div class="mb-4">
                                        <label class="x-small fw-bold text-uppercase tracking-widest text-muted mb-2 d-block">E-POSTA ADRESİ</label>
                                        <div class="position-relative">
                                            <i class="bi bi-envelope position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                            <input type="email" name="email" class="form-control rounded-4 py-3 ps-5 border-2 fw-semibold" placeholder="ismin@mail.com" required>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <label class="x-small fw-bold text-uppercase tracking-widest text-muted mb-0">ŞİFRE</label>
                                            <a href="#" class="x-small text-primary-red text-decoration-none fw-bold">UNUTTUM?</a>
                                        </div>
                                        <div class="position-relative">
                                            <i class="bi bi-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                            <input type="password" name="password" class="form-control rounded-4 py-3 ps-5 border-2 fw-semibold" placeholder="••••••••" required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold tracking-widest uppercase shadow-lg">OTURUM AÇ</button>
                                </form>
                            </div>

                            <!-- Register Form -->
                            <div class="tab-pane fade" id="register">
                                <form id="registerForm">
                                    <div class="mb-4">
                                        <label class="x-small fw-bold text-uppercase tracking-widest text-muted mb-2 d-block">AD SOYAD</label>
                                        <div class="position-relative">
                                            <i class="bi bi-person position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                            <input type="text" name="name" class="form-control rounded-4 py-3 ps-5 border-2 fw-semibold" placeholder="Ash Ketchum" required>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <label class="x-small fw-bold text-uppercase tracking-widest text-muted mb-2 d-block">E-POSTA</label>
                                        <div class="position-relative">
                                            <i class="bi bi-envelope position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                            <input type="email" name="email" class="form-control rounded-4 py-3 ps-5 border-2 fw-semibold" placeholder="ash@pallett.com" required>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <label class="x-small fw-bold text-uppercase tracking-widest text-muted mb-2 d-block">ŞİFRE</label>
                                        <div class="position-relative">
                                            <i class="bi bi-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                            <input type="password" name="password" class="form-control rounded-4 py-3 ps-5 border-2 fw-semibold" placeholder="En az 6 karakter" required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold tracking-widest uppercase shadow-lg">HESAP OLUŞTUR</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    
                    <p class="text-center mt-5 x-small text-muted fw-bold tracking-widest opacity-75">
                        Boutique TCG ve Pokémon Şirketi ile bir bağımız yoktur.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        $('#loginForm').submit(function(e) {
            e.preventDefault();
            const data = {
                email: $(this).find('[name="email"]').val(),
                password: $(this).find('[name="password"]').val()
            };
            $.post('/api/login', data, function(res) {
                if (res.success) window.location.href = 'index.html';
            }).fail(err => alert(err.responseJSON.message));
        });

        $('#registerForm').submit(function(e) {
            e.preventDefault();
            const data = {
                name: $(this).find('[name="name"]').val(),
                email: $(this).find('[name="email"]').val(),
                password: $(this).find('[name="password"]').val()
            };
            $.post('/api/register', data, function(res) {
                if (res.success) window.location.href = 'index.html';
            }).fail(err => alert(err.responseJSON.message));
        });
    </script>
</body>
</html>
